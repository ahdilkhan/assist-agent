<svg width="100%" viewBox="0 0 680 360" role="img" style="" xmlns="http://www.w3.org/2000/svg">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Kourzo logo concept — vertical compass with textured background</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A rounded square with a purple gradient background that includes a soft radial glow behind the compass and several small faint scattered dots for depth, containing a vertical needle with an open ring, the north arm longer and white, the south arm shorter and lavender, and a small gold center hub.</desc>
<defs>
<linearGradient id="bgTexture" x1="0" y1="1" x2="1" y2="0">
<stop offset="0%" stop-color="#0E0B27"/>
<stop offset="55%" stop-color="#2A2470"/>
<stop offset="100%" stop-color="#5A4FD6"/>
</linearGradient>
<radialGradient id="glowTexture" cx="0.5" cy="0.45" r="0.6">
<stop offset="0%" stop-color="#8A7EE8" stop-opacity="0.35"/>
<stop offset="100%" stop-color="#8A7EE8" stop-opacity="0"/>
</radialGradient>
<clipPath id="clipTexture">
<rect x="190" y="20" width="300" height="300" rx="48"/>
</clipPath>
</defs>

<rect x="190" y="20" width="300" height="300" rx="48" fill="url(#bgTexture)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

