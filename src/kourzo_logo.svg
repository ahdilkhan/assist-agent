<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <clipPath id="boxclip">
      <rect x="108" y="120" width="180" height="180" rx="36"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="680" height="420" fill="white"/>

  <!-- Rounded square icon background -->
  <rect x="108" y="120" width="180" height="180" rx="36" fill="#6C5CE7"/>

  <g clip-path="url(#boxclip)">
    <!-- Concentric rings -->
    <circle cx="188" cy="210" r="65" fill="none" stroke="white" stroke-width="1.5" opacity="0.18"/>
    <circle cx="188" cy="210" r="50" fill="none" stroke="white" stroke-width="2" opacity="0.28"/>
    <circle cx="188" cy="210" r="35" fill="none" stroke="white" stroke-width="2.5" opacity="0.42"/>
    <circle cx="188" cy="210" r="20" fill="none" stroke="white" stroke-width="3" opacity="0.65"/>
    <circle cx="188" cy="210" r="7.5" fill="white" opacity="1"/>

    <!-- Dotted map route -->
    <polyline
      points="278,295 258,272 268,258 248,245 235,258 188,210"
      fill="none"
      stroke="white"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-dasharray="5 4"
      opacity="0.55"/>

    <!-- Waypoint dots -->
    <circle cx="258" cy="272" r="4" fill="white" opacity="0.7"/>
    <circle cx="268" cy="258" r="4" fill="white" opacity="0.7"/>
    <circle cx="248" cy="245" r="4" fill="white" opacity="0.7"/>
  </g>

  <!-- K letterform -->
  <path d="
    M 148 155
    L 165 155
    L 165 202
    L 208 155
    L 228 155
    L 188 210
    L 228 265
    L 207 265
    L 165 218
    L 165 265
    L 148 265
    Z
  " fill="white"/>

  <!-- Bullseye center dot -->
  <circle cx="188" cy="210" r="5" fill="#6C5CE7"/>

  <!-- Wordmark: K in purple -->
  <text x="316" y="224" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="500" fill="#6C5CE7" letter-spacing="-2">K</text>
  <!-- ourzo in dark -->
  <text x="346" y="224" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="500" fill="#1a1a1a" letter-spacing="-2">ourzo</text>

  <!-- Divider -->
  <line x1="316" y1="238" x2="488" y2="238" stroke="#cccccc" stroke-width="0.75"/>

  <!-- Tagline -->
  <text x="316" y="258" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#888888" letter-spacing="3">COURSE · TRANSFER · MAP</text>

</svg>
